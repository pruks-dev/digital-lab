site_name: Digital Logic Laboratory 010113026
site_description: ปฏิบัติการดิจิทัลลอจิก — Digital Logic Lab worksheets
site_author: "010113026"
site_url: https://pruks-dev.github.io/digital-lab/
repo_url: https://github.com/pruks-dev/digital-lab
edit_uri: ""

theme:
  name: material
  language: th
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
  palette:
    primary: indigo
    accent: indigo

plugins:
  - search: {}
  - encryptcontent:
      password_inventory:
        staff:
          - !ENV [STAFF_PASSWORD, 'pruksdigilab2026']

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:
      generic: true
  - tables
  - footnotes
  - attr_list
  - md_in_html
  - toc:
      toc_depth: 3

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js

extra:
  social:
    - icon: fontawesome/brands/github

nav:
  - หน้าแรก: index.md
  - ใบงานการทดลองที่ 1: lab-1.md
  - ใบงานการทดลองที่ 2: lab-2.md
  - ใบงานการทดลองที่ 3: lab-3.md
  - ใบงานการทดลองที่ 4: lab-4.md
  - ใบงานการทดลองที่ 5: lab-5.md
  - ใบงานการทดลองที่ 6: lab-6.md
  - ใบงานการทดลองที่ 7: lab-7.md
  - ใบงานการทดลองที่ 8: lab-8.md

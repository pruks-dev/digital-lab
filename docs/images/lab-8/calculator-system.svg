<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="sans-serif">
  <style>
    .box { fill: #f0f4ff; stroke: #333; stroke-width: 2; }
    .box2 { fill: #f0fff0; stroke: #333; stroke-width: 2; }
    .box3 { fill: #fff0f0; stroke: #333; stroke-width: 2; }
    .wire { stroke: #333; stroke-width: 1.5; fill: none; }
    .wire-thick { stroke: #333; stroke-width: 2.5; fill: none; }
    .label { text-anchor: middle; font-size: 13px; fill: #333; }
    .label-sm { text-anchor: middle; font-size: 11px; fill: #666; }
  </style>

  <!-- Input: Switches -->
  <rect class="box" x="10" y="30" width="100" height="60" rx="4"/>
  <text x="60" y="55" class="label" font-weight="bold">SW3–SW0</text>
  <text x="60" y="72" class="label-sm">(Operand A)</text>

  <rect class="box" x="10" y="110" width="100" height="60" rx="4"/>
  <text x="60" y="135" class="label" font-weight="bold">SW7–SW4</text>
  <text x="60" y="152" class="label-sm">(Operand B)</text>

  <rect class="box" x="10" y="200" width="100" height="40" rx="4"/>
  <text x="60" y="225" class="label" font-weight="bold">KEY0/KEY1</text>

  <!-- Adder/Subtractor -->
  <rect class="box2" x="180" y="60" width="140" height="100" rx="4"/>
  <text x="250" y="100" class="label" font-weight="bold" font-size="14">4-bit</text>
  <text x="250" y="118" class="label" font-weight="bold" font-size="14">Adder/</text>
  <text x="250" y="136" class="label" font-weight="bold" font-size="14">Subtractor</text>

  <!-- Seven-Segment Decoder -->
  <rect class="box3" x="180" y="200" width="140" height="60" rx="4"/>
  <text x="250" y="228" class="label" font-weight="bold">7-Seg Decoder</text>
  <text x="250" y="245" class="label-sm">HEX0 + HEX1</text>

  <!-- Connections -->
  <line class="wire-thick" x1="110" y1="60" x2="180" y2="90"/>
  <line class="wire-thick" x1="110" y1="140" x2="180" y2="130"/>
  <line class="wire" x1="110" y1="220" x2="180" y2="220"/>
  <line class="wire" x1="180" y1="220" x2="180" y2="160"/>

  <line class="wire-thick" x1="250" y1="160" x2="250" y2="200"/>

  <!-- Outputs -->
  <rect class="box" x="380" y="60" width="100" height="60" rx="4"/>
  <text x="430" y="83" class="label" font-weight="bold">HEX0</text>
  <text x="430" y="100" class="label-sm">(Units)</text>

  <rect class="box" x="380" y="140" width="100" height="60" rx="4"/>
  <text x="430" y="163" class="label" font-weight="bold">HEX1</text>
  <text x="430" y="180" class="label-sm">(Tens)</text>

  <line class="wire-thick" x1="320" y1="230" x2="380" y2="90"/>
  <line class="wire-thick" x1="320" y1="230" x2="380" y2="170"/>

  <!-- Title -->
  <text x="250" y="320" class="label" font-size="16" font-weight="bold">Calculator System Block Diagram</text>
</svg>

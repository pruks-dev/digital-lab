<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 195" font-family="sans-serif">
  <style>
    .box    { fill: #f0f8ff; stroke: #4466aa; stroke-width: 2; }
    .gate   { fill: #fff; stroke: #333; stroke-width: 2; }
    .wire   { stroke: #333; stroke-width: 1.5; fill: none; }
    .lbl    { text-anchor: middle; font-size: 14px; fill: #333; }
    .lbl-s  { text-anchor: middle; font-size: 11px; fill: #666; }
    .lbl-L  { text-anchor: end; font-size: 14px; font-weight: bold; fill: #333; }
    .lbl-R  { text-anchor: start; font-size: 14px; font-weight: bold; fill: #333; }
    .title  { text-anchor: middle; font-size: 16px; font-weight: bold; fill: #333; }
  </style>

  <!-- Title -->
  <text x="250" y="22" class="title">Full Adder</text>

  <!-- ── Input labels ── -->
  <text x="18" y="63"  class="lbl-L">A</text>
  <text x="18" y="101" class="lbl-L">B</text>
  <text x="25" y="175" class="lbl-L">C<tspan dy="3" font-size="10">in</tspan></text>

  <!-- ── Input wires ── -->
  <line class="wire" x1="22" y1="59"  x2="80" y2="59"/>
  <line class="wire" x1="22" y1="97"  x2="80" y2="97"/>
  <line class="wire" x1="22" y1="171" x2="235" y2="171"/>
  <line class="wire" x1="235" y1="171" x2="235" y2="97"/>
  <line class="wire" x1="235" y1="97"  x2="245" y2="97"/>

  <!-- ── HA1 box ── -->
  <rect class="box" x="80" y="35" width="120" height="75"/>
  <text x="140" y="68" class="lbl" font-weight="bold" font-size="13">HA</text>
  <text x="140" y="86" class="lbl-s">Half Adder #1</text>

  <!-- HA1 → HA2: S₁ -->
  <line class="wire" x1="200" y1="59" x2="245" y2="59"/>
  <text x="223" y="53" class="lbl-s" font-size="10">S₁</text>

  <!-- HA1 → C₁: right then down to OR -->
  <line class="wire" x1="200" y1="97" x2="220" y2="97"/>
  <line class="wire" x1="220" y1="97" x2="220" y2="150"/>
  <line class="wire" x1="220" y1="150" x2="389" y2="150"/>
  <text x="210" y="92" class="lbl-s" font-size="10">C₁</text>

  <!-- ── HA2 box ── -->
  <rect class="box" x="245" y="35" width="120" height="75"/>
  <text x="305" y="68" class="lbl" font-weight="bold" font-size="13">HA</text>
  <text x="305" y="86" class="lbl-s">Half Adder #2</text>

  <!-- HA2 → Sum -->
  <line class="wire" x1="365" y1="59" x2="470" y2="59"/>
  <text x="475" y="63" class="lbl-R">Sum</text>

  <!-- HA2 → C₂: right then down into OR -->
  <line class="wire" x1="365" y1="97" x2="375" y2="97"/>
  <line class="wire" x1="375" y1="97" x2="375" y2="166"/>
  <line class="wire" x1="375" y1="166" x2="389" y2="166"/>
  <text x="373" y="92" class="lbl-s" font-size="10">C₂</text>

  <!-- ── OR gate ── -->
  <path class="gate" d="M 385,140 C 405,140 430,147 430,155 C 430,168 405,175 385,175 C 389,168 389,147 385,140 Z"/>

  <!-- OR → Cout -->
  <line class="wire" x1="430" y1="155" x2="470" y2="155"/>
  <text x="475" y="159" class="lbl-R">C<tspan dy="3" font-size="10">out</tspan></text>
</svg>
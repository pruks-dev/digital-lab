<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 510" font-family="monospace" font-size="11">
  <style>
    .body { fill: white; stroke: #333; stroke-width: 2; }
    .pin { stroke: #333; stroke-width: 1.5; }
    .wire { stroke: #333; stroke-width: 1.2; fill: none; }
    .gate { fill: white; stroke: #333; stroke-width: 1.5; }
    .pin-text { text-anchor: middle; font-size: 11px; fill: #333; }
    .title { text-anchor: middle; font-size: 14px; fill: #333; font-weight: bold; }
    .sub { text-anchor: middle; font-size: 11px; fill: #666; }
  </style>

  <g transform="scale(1.5)">
  <path d="M 60,70 L 500,70 L 500,270 L 60,270 L 60,182 A 12,12 0 0,0 60,158 Z" class="body"/>

  <!-- Top pins: 14(VCC) 13(6A) 12(6Y) 11(5A) 10(5Y) 9(4A) 8(4Y) -->
  <line x1="90" y1="30" x2="90" y2="70" class="pin"/>
  <text x="90" y="23" class="pin-text">14</text>
  <text x="90" y="10" class="pin-text" font-size="9">VCC</text>

  <line x1="153" y1="30" x2="153" y2="70" class="pin"/>
  <text x="153" y="23" class="pin-text">13</text>
  <text x="153" y="10" class="pin-text" font-size="9">6A</text>

  <line x1="217" y1="30" x2="217" y2="70" class="pin"/>
  <text x="217" y="23" class="pin-text">12</text>
  <text x="217" y="10" class="pin-text" font-size="9">6Y</text>

  <line x1="280" y1="30" x2="280" y2="70" class="pin"/>
  <text x="280" y="23" class="pin-text">11</text>
  <text x="280" y="10" class="pin-text" font-size="9">5A</text>

  <line x1="343" y1="30" x2="343" y2="70" class="pin"/>
  <text x="343" y="23" class="pin-text">10</text>
  <text x="343" y="10" class="pin-text" font-size="9">5Y</text>

  <line x1="407" y1="30" x2="407" y2="70" class="pin"/>
  <text x="407" y="23" class="pin-text">9</text>
  <text x="407" y="10" class="pin-text" font-size="9">4A</text>

  <line x1="470" y1="30" x2="470" y2="70" class="pin"/>
  <text x="470" y="23" class="pin-text">8</text>
  <text x="470" y="10" class="pin-text" font-size="9">4Y</text>

  <!-- Bottom pins: 1(1A) 2(1Y) 3(2A) 4(2Y) 5(3A) 6(3Y) 7(GND) -->
  <line x1="90" y1="270" x2="90" y2="310" class="pin"/>
  <text x="90" y="322" class="pin-text">1</text>
  <text x="90" y="336" class="pin-text" font-size="9">1A</text>

  <line x1="153" y1="270" x2="153" y2="310" class="pin"/>
  <text x="153" y="322" class="pin-text">2</text>
  <text x="153" y="336" class="pin-text" font-size="9">1Y</text>

  <line x1="217" y1="270" x2="217" y2="310" class="pin"/>
  <text x="217" y="322" class="pin-text">3</text>
  <text x="217" y="336" class="pin-text" font-size="9">2A</text>

  <line x1="280" y1="270" x2="280" y2="310" class="pin"/>
  <text x="280" y="322" class="pin-text">4</text>
  <text x="280" y="336" class="pin-text" font-size="9">2Y</text>

  <line x1="343" y1="270" x2="343" y2="310" class="pin"/>
  <text x="343" y="322" class="pin-text">5</text>
  <text x="343" y="336" class="pin-text" font-size="9">3A</text>

  <line x1="407" y1="270" x2="407" y2="310" class="pin"/>
  <text x="407" y="322" class="pin-text">6</text>
  <text x="407" y="336" class="pin-text" font-size="9">3Y</text>

  <line x1="470" y1="270" x2="470" y2="310" class="pin"/>
  <text x="470" y="322" class="pin-text">7</text>
  <text x="470" y="336" class="pin-text" font-size="9">GND</text>

  <!-- Internal NOT gates -->
  <!-- Row 1 (top, y=113): NOT6, NOT5, NOT4 (pointing RIGHT) -->
  <!-- NOT6: 6A(153) → NOT6 → 6Y(217) -->
  <polygon class="gate" points="175,105 191,113 175,121"/>
  <circle cx="194" cy="113" r="3" class="gate"/>
  <line class="wire" x1="153" y1="70" x2="153" y2="113"/>
  <line class="wire" x1="153" y1="113" x2="175" y2="113"/>
  <line class="wire" x1="197" y1="113" x2="217" y2="113"/>
  <line class="wire" x1="217" y1="113" x2="217" y2="70"/>

  <!-- NOT5: 5A(280) → NOT5 → 5Y(343) -->
  <polygon class="gate" points="302,105 318,113 302,121"/>
  <circle cx="321" cy="113" r="3" class="gate"/>
  <line class="wire" x1="280" y1="70" x2="280" y2="113"/>
  <line class="wire" x1="280" y1="113" x2="302" y2="113"/>
  <line class="wire" x1="324" y1="113" x2="343" y2="113"/>
  <line class="wire" x1="343" y1="113" x2="343" y2="70"/>

  <!-- NOT4: 4A(407) → NOT4 → 4Y(470) -->
  <polygon class="gate" points="429,105 445,113 429,121"/>
  <circle cx="448" cy="113" r="3" class="gate"/>
  <line class="wire" x1="407" y1="70" x2="407" y2="113"/>
  <line class="wire" x1="407" y1="113" x2="429" y2="113"/>
  <line class="wire" x1="451" y1="113" x2="470" y2="113"/>
  <line class="wire" x1="470" y1="113" x2="470" y2="70"/>

  <!-- Row 2 (bottom, y=215): NOT1, NOT2, NOT3 (pointing RIGHT) -->
  <!-- NOT1: 1A(90) → NOT1 → 1Y(153) -->
  <polygon class="gate" points="112,207 128,215 112,223"/>
  <circle cx="131" cy="215" r="3" class="gate"/>
  <line class="wire" x1="90" y1="270" x2="90" y2="215"/>
  <line class="wire" x1="90" y1="215" x2="112" y2="215"/>
  <line class="wire" x1="134" y1="215" x2="153" y2="215"/>
  <line class="wire" x1="153" y1="215" x2="153" y2="270"/>

  <!-- NOT2: 2A(217) → NOT2 → 2Y(280) -->
  <polygon class="gate" points="239,207 255,215 239,223"/>
  <circle cx="258" cy="215" r="3" class="gate"/>
  <line class="wire" x1="217" y1="270" x2="217" y2="215"/>
  <line class="wire" x1="217" y1="215" x2="239" y2="215"/>
  <line class="wire" x1="261" y1="215" x2="280" y2="215"/>
  <line class="wire" x1="280" y1="215" x2="280" y2="270"/>

  <!-- NOT3: 3A(343) → NOT3 → 3Y(407) -->
  <polygon class="gate" points="365,207 381,215 365,223"/>
  <circle cx="384" cy="215" r="3" class="gate"/>
  <line class="wire" x1="343" y1="270" x2="343" y2="215"/>
  <line class="wire" x1="343" y1="215" x2="365" y2="215"/>
  <line class="wire" x1="387" y1="215" x2="407" y2="215"/>
  <line class="wire" x1="407" y1="215" x2="407" y2="270"/>

  <text x="280" y="160" class="title">74HC04</text>
  <text x="280" y="80" class="sub">Hex Inverter (NOT Gate)</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" font-family="sans-serif">
  <style>
    .gate { fill: white; stroke: #333; stroke-width: 2; }
    .wire { stroke: #333; stroke-width: 1.5; fill: none; }
    .wire-thick { stroke: #333; stroke-width: 2.5; fill: none; }
    .label { text-anchor: middle; font-size: 14px; fill: #333; }
    .label-sm { text-anchor: middle; font-size: 11px; fill: #666; }
  </style>

  <rect class="gate" x="150" y="30" width="100" height="240" rx="4"/>
  <text x="200" y="155" class="label" font-weight="bold" font-size="16">Register</text>
  <text x="200" y="175" class="label-sm">4-bit</text>

  <text x="200" y="55" class="label" font-size="11">D[3..0]</text>
  <text x="200" y="80" class="label" font-size="11">CLK</text>
  <text x="200" y="105" class="label" font-size="11">RST</text>
  <text x="200" y="245" class="label" font-size="11">Q[3..0]</text>

  <line class="wire-thick" x1="10" y1="50" x2="150" y2="50"/>
  <text x="10" y="45" class="label" font-weight="bold">D[3:0]</text>

  <line class="wire" x1="10" y1="75" x2="50" y2="75"/>
  <line class="wire" x1="50" y1="75" x2="50" y2="65"/>
  <line class="wire" x1="50" y1="65" x2="150" y2="65"/>
  <polyline class="wire" points="45,60 50,65 55,60" fill="none"/>
  <text x="10" y="70" class="label" font-size="12">CLK</text>

  <line class="wire" x1="10" y1="100" x2="150" y2="100"/>
  <text x="10" y="95" class="label" font-size="12">RST</text>

  <line class="wire-thick" x1="250" y1="240" x2="350" y2="240"/>
  <text x="360" y="244" class="label" font-weight="bold">Q[3:0]</text>
</svg>

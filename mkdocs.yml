site_name: Digital Logic Laboratory 010113026
site_description: ปฏิบัติการดิจิทัลลอจิก — Digital Logic Lab worksheets
site_author: "010113026"
site_url: https://pruks-dev.github.io/digital-lab/
repo_url: https://github.com/pruks-dev/digital-lab
edit_uri: ""

theme:
  name: material
  language: th
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
  palette:
    primary: indigo
    accent: indigo

plugins:
  - search: {}
  - encryptcontent:
      password_inventory:
        staff:
          - !ENV [STAFF_PASSWORD, 'pruksdigilab2026']

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - tables
  - footnotes
  - attr_list
  - md_in_html
  - toc:
      toc_depth: 3

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github

nav:
  - หน้าแรก: index.md
  - ใบงานการทดลองที่ 1: ใบงานการทดลองที่ 1.md
  - ใบงานการทดลองที่ 2: ใบงานการทดลองที่ 2.md
  - ใบงานการทดลองที่ 3: ใบงานการทดลองที่ 3.md
  - ใบงานการทดลองที่ 4: ใบงานการทดลองที่ 4.md
  - ใบงานการทดลองที่ 5: ใบงานการทดลองที่ 5.md
  - ใบงานการทดลองที่ 6: ใบงานการทดลองที่ 6.md
  - ใบงานการทดลองที่ 7: ใบงานการทดลองที่ 7.md
  - ใบงานการทดลองที่ 8: ใบงานการทดลองที่ 8.md

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 290 260" font-family="sans-serif">
  <style>
    .gate { fill: white; stroke: #333; stroke-width: 2; }
    .wire { stroke: #333; stroke-width: 1.5; fill: none; }
    .label { text-anchor: middle; font-size: 14px; fill: #333; }
    .label-sm { text-anchor: middle; font-size: 11px; fill: #666; }
  </style>

  <!-- Input lines -->
  <line class="wire" x1="10" y1="45" x2="75" y2="45"/>   <!-- A → split point -->
  <line class="wire" x1="10" y1="70" x2="45" y2="70"/>   <!-- B → split point -->

  <!-- Input labels -->
  <text x="10" y="40" class="label" font-weight="bold">A</text>
  <text x="10" y="65" class="label" font-weight="bold">B</text>

  <!-- XOR Gate (Sum) -->
  <path class="gate" d="M 115 37.5 C 135 37.5, 160 45.5, 160 57.5 C 160 69.5, 135 77.5, 115 77.5 C 123 67.5, 123 47.5, 115 37.5 Z"/>
  <path d="M 111 77.5 C 119 67.5, 119 47.5, 111 37.5" fill="none" stroke="#333" stroke-width="2"/>
  <line class="wire" x1="160" y1="57.5" x2="190" y2="57.5"/>  <!-- XOR out -->

  <!-- A → XOR (from split to gate) -->
  <line class="wire" x1="75" y1="45" x2="115" y2="45"/>
  <!-- B → XOR (from split to gate) -->
  <line class="wire" x1="45" y1="70" x2="115" y2="70"/>

  <!-- Vertical drops -->
  <line class="wire" x1="75" y1="45" x2="75" y2="145"/>       <!-- A → AND top -->
  <line class="wire" x1="45" y1="70" x2="45" y2="170"/>       <!-- B → AND bottom -->

  <!-- Stubs into AND -->
  <line class="wire" x1="75" y1="145" x2="100" y2="145"/>     <!-- A into AND top -->
  <line class="wire" x1="45" y1="170" x2="100" y2="170"/>     <!-- B into AND bottom -->

  <!-- AND Gate (Carry) -->
  <path class="gate" d="M 100 137.5 L 120 137.5 A 20 20 0 0 1 120 177.5 L 100 177.5 Z"/>
  <line class="wire" x1="140" y1="157.5" x2="190" y2="157.5"/>  <!-- AND out -->

  <!-- Outputs -->
  <line class="wire" x1="190" y1="57.5" x2="250" y2="57.5"/>
  <text x="250" y="53" class="label" font-weight="bold">Sum (S)</text>

  <line class="wire" x1="190" y1="157.5" x2="250" y2="157.5"/>
  <text x="250" y="153" class="label" font-weight="bold">Carry (C)</text>

  <!-- Title -->
  <text x="150" y="230" class="label" font-size="16" font-weight="bold">Half Adder</text>
  <text x="111" y="248" class="label-sm" xml:space="preserve">S = A </text>
  <circle cx="132" cy="244" r="3.5" fill="none" stroke="#666" stroke-width="1.2"/>
  <line x1="128.5" y1="244" x2="135.5" y2="244" stroke="#666" stroke-width="1.2"/>
  <line x1="132" y1="240.5" x2="132" y2="247.5" stroke="#666" stroke-width="1.2"/>
  <text x="162" y="248" class="label-sm" xml:space="preserve"> B,  C = A </text>
  <circle cx="191" cy="244" r="1.3" fill="#666"/>
  <text x="199" y="248" class="label-sm" xml:space="preserve"> B</text>
</svg>

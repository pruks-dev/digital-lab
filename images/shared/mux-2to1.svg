<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 250" font-family="sans-serif">
  <style>
    .gate { fill: white; stroke: #333; stroke-width: 2; }
    .wire { stroke: #333; stroke-width: 1.5; fill: none; }
    .wire-thick { stroke: #333; stroke-width: 2.5; fill: none; }
    .label { text-anchor: middle; font-size: 14px; fill: #333; }
    .label-sm { text-anchor: middle; font-size: 11px; fill: #666; }
  </style>

  <!-- MUX box -->
  <polygon class="gate" points="60,40 60,200 180,200 180,120 210,120 210,40"/>
  
  <!-- Input lines -->
  <line class="wire-thick" x1="10" y1="70" x2="60" y2="70"/>
  <line class="wire-thick" x1="10" y1="130" x2="60" y2="130"/>
  <line class="wire-thick" x1="10" y1="200" x2="60" y2="200"/>

  <!-- Output line -->
  <line class="wire" x1="210" y1="80" x2="260" y2="80"/>
  <line class="wire-thick" x1="260" y1="80" x2="310" y2="80"/>

  <!-- Labels -->
  <text x="10" y="65" class="label" font-weight="bold">I₀</text>
  <text x="10" y="125" class="label" font-weight="bold">I₁</text>
  <text x="10" y="195" class="label" font-weight="bold">S</text>
  
  <text x="300" y="77" class="label" font-weight="bold">Y</text>

  <!-- Internal triangle for MUX -->
  <polygon points="120,105 95,135 145,135" fill="none" stroke="#333" stroke-width="1.5"/>

  <!-- Title -->
  <text x="135" y="245" class="label" font-size="16" font-weight="bold">MUX 2-to-1</text>
  <text x="135" y="15" class="label-sm">Y = I₀ · S̅  +  I₁ · S</text>
</svg>
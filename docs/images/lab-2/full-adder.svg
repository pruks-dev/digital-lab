<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="sans-serif">
  <style>
    .gate { fill: white; stroke: #333; stroke-width: 2; }
    .wire { stroke: #333; stroke-width: 1.5; fill: none; }
    .wire-thick { stroke: #333; stroke-width: 2.5; fill: none; }
    .label { text-anchor: middle; font-size: 14px; fill: #333; }
    .label-sm { text-anchor: middle; font-size: 11px; fill: #666; }
  </style>

  <!-- Input lines -->
  <line class="wire-thick" x1="10" y1="60" x2="50" y2="60"/>
  <line class="wire-thick" x1="10" y1="110" x2="50" y2="110"/>
  <line class="wire-thick" x1="10" y1="250" x2="50" y2="250"/>
  
  <text x="10" y="55" class="label" font-weight="bold">A</text>
  <text x="10" y="105" class="label" font-weight="bold">B</text>
  <text x="10" y="245" class="label" font-weight="bold">Cᵢₙ</text>

  <!-- HA1 box -->
  <rect x="80" y="30" width="100" height="110" rx="8" fill="#f0f8ff" stroke="#4466aa" stroke-width="2"/>
  <text x="130" y="75" class="label" font-weight="bold" font-size="13">HA</text>
  <text x="130" y="95" class="label-sm" font-size="10">Half Adder</text>
  <text x="130" y="115" class="label-sm" font-size="10">#1</text>

  <!-- HA1 inputs -->
  <line class="wire" x1="50" y1="60" x2="80" y2="60"/>
  <line class="wire" x1="50" y1="110" x2="80" y2="110"/>

  <!-- HA1 outputs -->
  <line class="wire" x1="180" y1="60" x2="220" y2="60"/>  <!-- S1 -->  
  <line class="wire" x1="180" y1="110" x2="220" y2="110"/> <!-- C1 -->

  <!-- HA2 box -->
  <rect x="250" y="30" width="100" height="110" rx="8" fill="#f0f8ff" stroke="#4466aa" stroke-width="2"/>
  <text x="300" y="75" class="label" font-weight="bold" font-size="13">HA</text>
  <text x="300" y="95" class="label-sm" font-size="10">Half Adder</text>
  <text x="300" y="115" class="label-sm" font-size="10">#2</text>

  <!-- HA2 inputs: S1 + Cin -->
  <line class="wire" x1="220" y1="60" x2="250" y2="60"/>  <!-- S1 → HA2 A -->
  <line class="wire" x1="50" y1="250" x2="100" y2="250"/>
  <line class="wire" x1="100" y1="250" x2="100" y2="240"/>
  <line class="wire" x1="100" y1="240" x2="250" y2="240"/> <!-- Cin → HA2 B -->
  <line class="wire" x1="250" y1="115" x2="250" y2="140"/>

  <!-- Wait, let me reconsider. HA inputs should be at top and bottom of the box -->
  <!-- A=left, B=left for HA inputs. The box inputs are on the left side. -->
  <!-- HA2 input A (top): from HA1 S1 -->
  <!-- HA2 input B (bottom): from Cin -->

  <!-- Let me redraw the wiring more carefully -->
  
  <!-- Clear and redraw -->
  <rect x="0" y="0" width="500" height="350" fill="white"/>

  <!-- Inputs -->
  <line class="wire-thick" x1="10" y1="60" x2="80" y2="60"/>
  <line class="wire-thick" x1="10" y1="120" x2="80" y2="120"/>
  <line class="wire-thick" x1="10" y1="280" x2="80" y2="280"/>
  
  <text x="10" y="55" class="label" font-weight="bold">A</text>
  <text x="10" y="115" class="label" font-weight="bold">B</text>
  <text x="10" y="275" class="label" font-weight="bold">Cᵢₙ</text>

  <!-- HA1 -->
  <rect x="80" y="30" width="100" height="120" rx="8" fill="#f0f8ff" stroke="#4466aa" stroke-width="2"/>
  <text x="130" y="80" class="label" font-weight="bold" font-size="14">HA</text>
  <text x="130" y="100" class="label-sm" font-size="10">Half Adder</text>
  <text x="130" y="120" class="label-sm" font-size="10">#1</text>

  <line class="wire" x1="80" y1="60" x2="65" y2="60"/>
  <line class="wire" x1="80" y1="120" x2="65" y2="120"/>

  <!-- HA1 outputs: S1 (top out), C1 (bottom out) -->
  <line class="wire" x1="180" y1="60" x2="220" y2="60"/>  <!-- S1 out -->
  <line class="wire" x1="180" y1="120" x2="200" y2="120"/>
  <line class="wire" x1="200" y1="120" x2="200" y2="200"/>
  <line class="wire" x1="200" y1="200" x2="375" y2="200"/> <!-- C1 → OR -->

  <!-- HA2 -->
  <rect x="250" y="30" width="100" height="120" rx="8" fill="#f0f8ff" stroke="#4466aa" stroke-width="2"/>
  <text x="300" y="80" class="label" font-weight="bold" font-size="14">HA</text>
  <text x="300" y="100" class="label-sm" font-size="10">Half Adder</text>
  <text x="300" y="120" class="label-sm" font-size="10">#2</text>

  <!-- HA2 inputs -->
  <line class="wire" x1="220" y1="60" x2="250" y2="60"/>  <!-- S1 → HA2 A -->
  <line class="wire" x1="80" y1="280" x2="150" y2="280"/>
  <line class="wire" x1="150" y1="280" x2="150" y2="150"/>
  <line class="wire" x1="150" y1="150" x2="250" y2="150"/>  <!-- Cin → HA2 B -->

  <!-- HA2 outputs: S2 (top), C2 (bottom) -->
  <line class="wire" x1="350" y1="60" x2="420" y2="60"/>  <!-- Sum out -->
  <line class="wire" x1="350" y1="120" x2="350" y2="200"/>
  <line class="wire" x1="350" y1="200" x2="375" y2="200"/> <!-- C2 → OR -->

  <!-- OR Gate -->
  <path class="gate" d="M 370 185 C 390 185, 415 192, 415 207 C 415 222, 390 229, 370 229 C 378 219, 378 199, 370 185 Z"/>
  <text x="390" y="211" class="label" font-size="11">≥1</text>

  <!-- OR inputs: C1 and C2 already at y=200 -->
  <!-- C1 comes from left at y=200 -->
  <!-- C2 comes from HA2 bottom at y=120, goes down to y=200 -->

  <!-- OR output -->  
  <line class="wire" x1="415" y1="207" x2="450" y2="207"/>
  <line class="wire-thick" x1="450" y1="207" x2="480" y2="207"/>

  <!-- Final output labels -->
  <text x="480" y="55" class="label" font-weight="bold" font-size="13">Sum (S)</text>
  <text x="480" y="205" class="label" font-weight="bold" font-size="13">Cₒᵤₜ</text>

  <!-- Title -->
  <text x="250" y="330" class="label" font-size="16" font-weight="bold">Full Adder</text>
  <text x="250" y="348" class="label-sm">S = A ⊕ B ⊕ Cᵢₙ,  Cₒᵤₜ = (A·B) + (Cᵢₙ·(A⊕B))</text>
</svg>
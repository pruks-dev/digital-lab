<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 400">
  <style>
    .wire { fill:none; stroke:#000; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
    .comp { fill:none; stroke:#000; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
    .lbl { font-family:sans-serif; font-size:14px; text-anchor:middle; }
    .sm { font-family:sans-serif; font-size:12px; text-anchor:middle; }
    .dot { fill:#000; }
    .ic-body { fill:#fff; stroke:#000; stroke-width:2; }
  </style>

  <!-- VCC rail -->
  <line class="wire" x1="100" y1="40" x2="400" y2="40"/>
  <text class="lbl" x="100" y="32">VCC (+5V)</text>

  <!-- VCC drop for Push Button -->
  <line class="wire" x1="140" y1="40" x2="140" y2="70"/>

  <!-- Push Button -->
  <line class="wire" x1="140" y1="70" x2="140" y2="80"/>
  <circle class="dot" cx="140" cy="80" r="2.5"/>
  <line class="wire" x1="140" y1="115" x2="140" y2="125"/>
  <circle class="dot" cx="140" cy="125" r="2.5"/>
  <line class="comp" x1="150" y1="78" x2="140" y2="115"/>
  <circle class="dot" cx="150" cy="78" r="2.5"/>
  <text class="sm" x="175" y="103">SW</text>

  <!-- Wire to input node -->
  <line class="wire" x1="140" y1="125" x2="140" y2="150"/>
  <circle class="dot" cx="140" cy="150" r="3"/>

  <!-- Pull-down resistor -->
  <line class="wire" x1="140" y1="150" x2="140" y2="170"/>
  <polyline class="comp" points="140,170 155,175 125,183 155,191 125,199 155,207 140,213 140,220"/>
  <text class="sm" x="200" y="198">10 kΩ</text>
  <line class="wire" x1="140" y1="220" x2="140" y2="250"/>

  <!-- GND symbol for pull-down -->
  <line class="wire" x1="100" y1="250" x2="180" y2="250"/>
  <line class="wire" x1="115" y1="260" x2="165" y2="260"/>
  <line class="wire" x1="130" y1="270" x2="150" y2="270"/>

  <!-- Input wire to IC -->
  <line class="wire" x1="143" y1="150" x2="250" y2="150"/>
  <text class="sm" x="195" y="140">อินพุต</text>

  <!-- IC block -->
  <rect class="ic-body" x="250" y="115" width="60" height="70" rx="3"/>
  <text class="sm" x="280" y="155">IC</text>
  <text class="sm" x="280" y="200">74HC04</text>

  <!-- IC input pin -->
  <circle class="dot" cx="250" cy="150" r="2.5"/>

  <!-- IC output pin -->
  <line class="wire" x1="310" y1="150" x2="390" y2="150"/>
  <circle class="dot" cx="310" cy="150" r="2.5"/>
  <text class="sm" x="350" y="140">เอาต์พุต</text>

  <!-- IC VCC pin -->
  <line class="wire" x1="260" y1="115" x2="260" y2="40"/>
  <circle class="dot" cx="260" cy="115" r="2.5"/>
  <circle class="dot" cx="260" cy="40" r="2.5"/>
  <text class="sm" x="240" y="30">VCC IC</text>

  <!-- IC GND pin -->
  <line class="wire" x1="300" y1="185" x2="300" y2="250"/>
  <circle class="dot" cx="300" cy="185" r="2.5"/>

  <!-- GND symbol for IC -->
  <line class="wire" x1="260" y1="250" x2="340" y2="250"/>
  <line class="wire" x1="275" y1="260" x2="325" y2="260"/>
  <line class="wire" x1="290" y1="270" x2="310" y2="270"/>
  <text class="sm" x="320" y="244">GND IC</text>

  <!-- Output to 330Ω resistor -->
  <line class="wire" x1="390" y1="150" x2="390" y2="170"/>

  <!-- 330Ω resistor -->
  <polyline class="comp" points="390,170 405,175 375,183 405,191 375,199 405,207 390,213 390,220"/>
  <text class="sm" x="430" y="199">330Ω</text>

  <!-- Wire to LED -->
  <line class="wire" x1="390" y1="220" x2="390" y2="235"/>

  <!-- LED -->
  <polygon class="comp" points="370,235 410,235 390,265"/>
  <line class="wire" x1="372" y1="269" x2="408" y2="269"/>
  <text class="sm" x="425" y="257">LED</text>

  <!-- LED cathode to GND -->
  <line class="wire" x1="390" y1="269" x2="390" y2="300"/>

  <!-- GND symbol for LED -->
  <line class="wire" x1="340" y1="300" x2="440" y2="300"/>
  <line class="wire" x1="355" y1="310" x2="425" y2="310"/>
  <line class="wire" x1="370" y1="320" x2="410" y2="320"/>
</svg>

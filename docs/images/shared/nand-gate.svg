<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" font-family="sans-serif">
  <style>
    .gate { fill: #fff; stroke: #333; stroke-width: 2; }
    .wire { stroke: #333; stroke-width: 1.5; fill: none; }
    .lbl  { text-anchor: middle; font-size: 14px; font-weight: bold; fill: #333; }
    .tag  { text-anchor: middle; font-size: 12px; fill: #666; }
  </style>

  <!-- AND curve -->
  <path class="gate" d="M 50,20 L 65,20 A 25,25 0 0,1 65,70 L 50,70 Z"/>
  <!-- Bubble -->
  <circle cx="96" cy="45" r="6" class="gate"/>

  <!-- Input wires -->
  <line class="wire" x1="20" y1="30" x2="50" y2="30"/>
  <line class="wire" x1="20" y1="60" x2="50" y2="60"/>

  <!-- Output wire -->
  <line class="wire" x1="102" y1="45" x2="140" y2="45"/>

  <!-- Pin labels -->
  <text x="16" y="26" class="lbl">A</text>
  <text x="16" y="72" class="lbl">B</text>
  <text x="155" y="49" class="lbl">Y</text>

  <!-- Title -->
  <text x="100" y="105" class="tag">NAND Gate</text>
</svg>
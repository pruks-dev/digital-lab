<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 250" font-family="sans-serif">
  <style>
    .gate     { fill: #fff; stroke: #333; stroke-width: 2; }
    .wire     { stroke: #333; stroke-width: 1.5; fill: none; }
    .lbl      { text-anchor: middle; font-size: 14px; fill: #333; }
    .lbl-sm   { text-anchor: middle; font-size: 11px; fill: #666; }
    .lbl-in   { text-anchor: end; font-size: 14px; font-weight: bold; fill: #333; }
    .lbl-out  { text-anchor: start; font-size: 14px; font-weight: bold; fill: #333; }
    .title    { text-anchor: middle; font-size: 16px; font-weight: bold; fill: #333; }
  </style>

  <text x="145" y="22" class="title">MUX 2-to-1</text>

  <!-- MUX trapezoid: left wide, right narrow -->
  <polygon class="gate" points="80,50 150,100 150,150 80,200"/>

  <!-- Inputs -->
  <line class="wire" x1="18" y1="80"  x2="80" y2="80"/>
  <text x="15" y="84" class="lbl-in">I₀</text>

  <line class="wire" x1="18" y1="170" x2="80" y2="170"/>
  <text x="15" y="174" class="lbl-in">I₁</text>

  <line class="wire" x1="18" y1="230" x2="115" y2="230"/>
  <line class="wire" x1="115" y1="230" x2="115" y2="175"/>
  <text x="15" y="234" class="lbl-in">S</text>

  <!-- Output -->
  <line class="wire" x1="150" y1="125" x2="250" y2="125"/>
  <line class="wire" x1="250" y1="125" x2="280" y2="125"/>
  <text x="285" y="129" class="lbl-out">Y</text>
</svg>